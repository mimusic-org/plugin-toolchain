# ⚠️ 备用方案：jsc 系列包的独立发布工作流
# 主要发布已集成到统一 release.yml 中（通过 v*.*.* tag 触发）。
# 此文件保留用于需要单独发布 jsc 时的手动触发场景。
name: Release JSC (standalone)

on:
  # 不再由 tag push 自动触发，仅支持手动触发
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. jsc-v1.0.0) — only use when need to publish jsc independently'
        required: true

concurrency:
  group: release-jsc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build jsc (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            npm_pkg: jsc-linux-x64
            binary: jsc
            suffix: ''
          - goos: linux
            goarch: arm64
            npm_pkg: jsc-linux-arm64
            binary: jsc
            suffix: ''
          - goos: darwin
            goarch: amd64
            npm_pkg: jsc-darwin-x64
            binary: jsc
            suffix: ''
          - goos: darwin
            goarch: arm64
            npm_pkg: jsc-darwin-arm64
            binary: jsc
            suffix: ''
          - goos: windows
            goarch: amd64
            npm_pkg: jsc-win32-x64
            binary: jsc.exe
            suffix: '.exe'
          - goos: windows
            goarch: arm64
            npm_pkg: jsc-win32-arm64
            binary: jsc.exe
            suffix: '.exe'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: plugin-toolchain/packages/jsc/go.sum

      - name: Build
        working-directory: plugin-toolchain/packages/jsc
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../../../dist/${{ matrix.npm_pkg }}/bin
          go build -ldflags="-s -w" -o "../../../dist/${{ matrix.npm_pkg }}/bin/${{ matrix.binary }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: dist/${{ matrix.npm_pkg }}/bin/${{ matrix.binary }}

  publish:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: plugin-toolchain/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        working-directory: plugin-toolchain
        run: pnpm install --frozen-lockfile

      - name: Ensure npm supports Trusted Publishing (OIDC)
        run: npm install -g npm@latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Determine version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#jsc-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare platform packages for publish
        working-directory: plugin-toolchain
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          for pkg in jsc-linux-x64 jsc-linux-arm64 jsc-darwin-x64 jsc-darwin-arm64 jsc-win32-x64 jsc-win32-arm64; do
            PKG_DIR="packages/$pkg"
            # Copy binary from artifact
            mkdir -p "$PKG_DIR/bin"
            cp ../artifacts/$pkg/* "$PKG_DIR/bin/"
            chmod +x "$PKG_DIR/bin/"* 2>/dev/null || true
            # Update version in package.json
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$PKG_DIR/package.json', 'utf8'));
              p.version = '$VERSION';
              fs.writeFileSync('$PKG_DIR/package.json', JSON.stringify(p, null, 2) + '\n');
            "
            echo "✅ $pkg prepared (v$VERSION)"
          done

      - name: Prepare main jsc package
        working-directory: plugin-toolchain
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('packages/jsc/package.json', 'utf8'));
            p.version = '$VERSION';
            for (const dep of Object.keys(p.optionalDependencies || {})) {
              p.optionalDependencies[dep] = '$VERSION';
            }
            fs.writeFileSync('packages/jsc/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo "✅ @mimusic/jsc prepared (v$VERSION)"

      - name: Publish platform packages to npm
        working-directory: plugin-toolchain
        run: |
          for pkg in jsc-linux-x64 jsc-linux-arm64 jsc-darwin-x64 jsc-darwin-arm64 jsc-win32-x64 jsc-win32-arm64; do
            echo "Publishing @mimusic/$pkg..."
            cd "packages/$pkg"
            npm publish --access public --provenance || echo "⚠️ $pkg publish failed (may already exist)"
            cd ../..
          done
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Publish main jsc package to npm
        working-directory: plugin-toolchain/packages/jsc
        run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name 'jsc*' -exec sha256sum {} \; | sort > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "JSC ${{ steps.ver.outputs.tag }}"
          body: |
            ## JSC Bytecode Compiler

            Pre-compiled binaries for the QuickJS bytecode compiler tool.

            ### Install
            ```bash
            npm install @mimusic/jsc
            ```

            The correct binary for your platform will be installed automatically via optional dependencies.

            ### Platforms
            - `@mimusic/jsc-linux-x64` — Linux x86_64
            - `@mimusic/jsc-linux-arm64` — Linux ARM64
            - `@mimusic/jsc-darwin-x64` — macOS Intel
            - `@mimusic/jsc-darwin-arm64` — macOS Apple Silicon
            - `@mimusic/jsc-win32-x64` — Windows x86_64
            - `@mimusic/jsc-win32-arm64` — Windows ARM64

            ### Usage
            ```javascript
            import { getJscBinaryPath } from '@mimusic/jsc';
            const jscPath = getJscBinaryPath();
            ```
          draft: false
          prerelease: false
          files: artifacts/checksums.txt
