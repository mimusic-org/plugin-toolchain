name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm and GitHub
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 GitHub Release
      id-token: write   # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要全部历史，用于生成 release notes

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure npm supports Trusted Publishing (OIDC)
        run: npm install -g npm@latest

      - name: Build all packages
        run: pnpm --filter "./packages/*" build

      - name: Verify version matches tag
        id: ver
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          for pkg in plugin-sdk plugin-builder create-mimusic-plugin; do
            PKG_VER=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$PKG_VER" != "$VERSION" ]; then
              echo "❌ packages/$pkg/package.json version=$PKG_VER does not match tag=$VERSION"
              exit 1
            fi
          done
          echo "✅ all three packages aligned at $VERSION"

      - name: Publish all packages to npm
        # 仓库为 public + OIDC Trusted Publishing，启用 sigstore provenance（供 npm install --provenance 核查）
        run: pnpm --filter "./packages/*" publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -e
          PREV=$(git tag --list 'v*.*.*' --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)
          {
            echo "## What's Changed"
            echo
            if [ -n "$PREV" ]; then
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
              echo
              git log "${PREV}..${TAG}" --pretty=format:'- %s (%h)' --no-merges
            else
              echo "Initial release."
              echo
              git log "${TAG}" --pretty=format:'- %s (%h)' --no-merges -n 50
            fi
            echo
            echo
            echo "## Published Packages"
            echo
            VER="${TAG#v}"
            echo "- \`@mimusic/plugin-sdk@${VER}\`"
            echo "- \`@mimusic/plugin-builder@${VER}\`"
            echo "- \`create-mimusic-plugin@${VER}\`"
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
